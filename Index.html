<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatGPT Nexus Redesign</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:'Inter',sans-serif;
background:#050505;
color:#fff;
height:100vh;
overflow:hidden;
position:relative;
}
body::before{
content:'';
position:absolute;
width:1000px;
height:1000px;
left:50%;
top:50%;
transform:translate(-50%,-50%);
background:radial-gradient(circle,rgba(37,99,235,.25) 0%,rgba(37,99,235,.12) 30%,transparent 70%);
filter:blur(80px);
pointer-events:none;
}
.sidebar{
position:fixed;
left:0;
top:0;
width:78px;
height:100vh;
padding:18px 0;
display:flex;
flex-direction:column;
align-items:center;
justify-content:space-between;
border-right:1px solid rgba(255,255,255,.05);
background:rgba(0,0,0,.25);
backdrop-filter:blur(20px);
}
.sidebar-top,.sidebar-bottom{
display:flex;
flex-direction:column;
align-items:center;
gap:14px;
}
.logo{
font-size:26px;
}
.icon-btn{
width:48px;
height:48px;
border-radius:50%;
background:#000000;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
transition:.25s;
font-size:20px;
}
.icon-btn:hover{
transform:translateY(-2px);
background:#222;
}
.main{
margin-left:78px;
height:100vh;
display:flex;
flex-direction:column;
}
.topbar{
height:80px;
display:flex;
align-items:center;
justify-content:flex-end;
padding:0 30px;
gap:15px;
}
.upgrade{
background:#0b5ea8;
padding:12px 24px;
border-radius:999px;
font-weight:600;
}
.content{
flex:1;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
width:100%;
}
.title{
font-size:32px;
font-weight:300;
margin-bottom:45px;
text-align:center;
}
.prompt{
width:min(850px,85vw);
height:76px;
background:#1b1b1b;
border:1px solid rgba(255,255,255,.08);
border-radius:40px;
display:flex;
align-items:center;
padding:0 22px;
gap:15px;
box-shadow:0 0 40px rgba(37,99,235,.08);
}
.prompt input{
flex:1;
background:none;
border:none;
outline:none;
color:#fff;
font-size:20px;
}
.prompt .left,
.prompt .right{
font-size:26px;
color:#cfcfcf;
}
.extras{
position:absolute;
right:25px;
top:100px;
width:280px;
display:flex;
flex-direction:column;
gap:15px;
}
.card{
background:rgba(20,20,20,.75);
backdrop-filter:blur(16px);
border:1px solid rgba(255,255,255,.08);
border-radius:20px;
padding:18px;
}
.card h3{
margin-bottom:10px;
font-size:18px;
}
.card p{
color:#bbb;
margin:8px 0;
}
.footer-profile{
width:48px;
height:48px;
border-radius:50%;
background:#000000;
display:flex;
align-items:center;
justify-content:center;
font-weight:700;
}
@media(max-width:1000px){
.extras{display:none}
.title{font-size:42px}
.prompt{width:90vw}
}
</style>
</head>
<body>

<div class="sidebar">
<div class="sidebar-top">
<div class="logo"><img src="image.png" alt="logo" style="width:26px;height:26px;"></div>
<div class="icon-btn">✎</div>
<div class="icon-btn">⌕</div>
<div class="icon-btn">☰</div>
<div class="icon-btn">🤖</div>
</div>

<div class="sidebar-bottom">
<div class="icon-btn">⚙</div>
<div class="footer-profile">A</div>
</div>
</div>

<div class="main">

<div class="topbar">
<img src="temp.png" alt="icon" style="width:50px;height:50px;">
</div>

<div class="content">
<div class="title">What should we focus on?</div>

<div class="prompt">
<div class="left">＋</div>
<input placeholder="Ask ChatGPT Redesigned">
<div>GPT‑5</div>
<img src="voice.png" alt="voice" style="width:24px;height:24px;">
</div>
</div>



</div>

</body>
</html>
